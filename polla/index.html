<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polla Deportiva - Streaming DPC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #4cd137;
            --secondary: #3498db;
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 500px; background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--primary); font-weight: 800; margin-bottom: 20px; }
        .alert { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; }
        .alert-warning { background: rgba(243, 156, 18, 0.2); border: 1px solid #f39c12; color: #f39c12; }
        .alert-info { background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; color: #3498db; }
        .alert-success { background: rgba(76, 209, 55, 0.2); border: 1px solid #4cd137; color: #4cd137; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; }
        input[type="text"], input[type="email"], input[type="number"], input[type="tel"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
        .partido-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .partido-header { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .score-grid { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .team { flex: 1; text-align: center; font-weight: 600; font-size: 0.95rem; }
        .score-input { width: 60px !important; text-align: center; font-size: 1.2rem; font-weight: 800; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.9rem; }
        .logout { color: #ff6b6b; text-decoration: none; cursor:pointer; }
        #loading { text-align: center; padding: 20px; color: var(--primary); }
    </style>
</head>
<body>
    <div id="loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>
    
    <div class="container" id="main-container" style="display:none;">
        <h1>⚽ Polla Deportiva</h1>

        <!-- SECCIÓN: LOGIN / REGISTRO -->
        <div id="login-section" style="display:none;">
            <p style="text-align:center; color:#ccc; margin-bottom: 20px;">Identifícate con tu WhatsApp para participar</p>
            <div class="form-group">
                <label>Tu Número de WhatsApp</label>
                <input type="tel" id="user-phone" placeholder="Ej: 3155182545">
            </div>
            <div id="register-fields" style="display:none;">
                <div class="form-group">
                    <label>Tu Nombre Completo (Para el registro)</label>
                    <input type="text" id="user-name" placeholder="Ej: Juan Pérez">
                </div>
            </div>
            <button onclick="identifyUser()" class="btn btn-primary" id="btn-identify">Entrar al Módulo</button>
        </div>

        <!-- SECCIÓN: INTERFAZ DE USUARIO -->
        <div id="user-section" style="display:none;">
            <div class="user-info">
                <span>Hola, <strong id="display-name">...</strong></span>
                <span class="logout" onclick="logout()">Cerrar Sesión</span>
            </div>

            <div id="status-container"></div>
            <div id="partidos-container"></div>
            <button id="btn-save-vote" onclick="savePronostico()" class="btn btn-primary" style="margin-top: 20px; display:none;">Guardar Pronóstico</button>
        </div>
    </div>

    <script>
        // Configuración de Firebase (Extraída de app.js)
        const firebaseConfig = {
            apiKey: "AIzaSyBscP8FT1dcnHlSFMXc3DlfXSgRO9ET9s4",
            authDomain: "streamingdpc-7e7fa.firebaseapp.com",
            databaseURL: "https://streamingdpc-7e7fa-default-rtdb.firebaseio.com",
            projectId: "streamingdpc-7e7fa",
            storageBucket: "streamingdpc-7e7fa.firebasestorage.app",
            messagingSenderId: "831116907849",
            appId: "1:831116907849:web:ee8e744db342970fd0b698"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let pollaConfig = { precio: 10000, nequi: '3000000000' };

        // Al iniciar
        window.onload = async () => {
            // Live Sync Module
            db.ref('config/app_version').on('value', snap => {
                if (snap.val() && snap.val() !== '3.8.7') location.reload();
            });

            // Cargar Configuración
            db.ref('polla/config').on('value', snap => {
                if(snap.exists()) pollaConfig = snap.val();
            });

            // Buscar celular en URL (desde el parent index.html)
            const urlParams = new URLSearchParams(window.location.search);
            const urlPhone = urlParams.get('phone');

            if(urlPhone) {
                checkUser(urlPhone);
            } else {
                const savedPhone = localStorage.getItem('polla_phone');
                if(savedPhone) {
                    checkUser(savedPhone);
                } else {
                    showView('login'); // Esto quita el Cargando...
                }
            }
        };

        function showView(view) {
            const loading = document.getElementById('loading');
            const main = document.getElementById('main-container');
            const login = document.getElementById('login-section');
            const user = document.getElementById('user-section');

            if(loading) loading.style.display = 'none';
            if(main) main.style.display = 'block';
            if(login) login.style.display = view === 'login' ? 'block' : 'none';
            if(user) user.style.display = view === 'user' ? 'block' : 'none';
        }

        async function identifyUser() {
            const phone = document.getElementById('user-phone').value.trim();
            const nameField = document.getElementById('register-fields');
            const nameInput = document.getElementById('user-name');
            
            if(!phone) return alert('Ingresa tu teléfono');

            const snap = await db.ref(`polla/usuarios/${phone}`).once('value');
            if(snap.exists()) {
                localStorage.setItem('polla_phone', phone);
                checkUser(phone);
            } else {
                if(nameField.style.display === 'none') {
                    nameField.style.display = 'block';
                    document.getElementById('btn-identify').innerText = 'Crear Registro y Entrar';
                } else {
                    const name = nameInput.value.trim();
                    if(!name) return alert('Ingresa tu nombre');
                    await db.ref(`polla/usuarios/${phone}`).set({
                        nombre: name,
                        telefono: phone,
                        pago_confirmado: false,
                        voto_realizado: false,
                        fecha_registro: Date.now()
                    });
                    localStorage.setItem('polla_phone', phone);
                    checkUser(phone);
                }
            }
        }

        function checkUser(phone) {
            console.log("Accediendo con:", phone);
            try {
                db.ref(`polla/usuarios/${phone}`).on('value', snap => {
                    if(!snap.exists()) {
                        document.getElementById('user-phone').value = phone;
                        showView('login');
                        return;
                    }
                    currentUser = snap.val();
                    currentUser.telefono = phone;
                    document.getElementById('display-name').innerText = currentUser.nombre || 'Participante';
                    
                    // Escuchar votos y renderizar todo de una vez
                    db.ref(`polla/pronosticos/${phone}`).on('value', vSnap => {
                        const misVotos = vSnap.val() || {};
                        renderStatus(phone, misVotos);
                        renderPartidos(misVotos);
                        showView('user'); // Quitar el Cargando...
                    });
                }, err => {
                    console.error(err);
                    showView('login');
                });
            } catch (e) {
                console.error(e);
                showView('login');
            }
        }

        function renderStatus(phone, misVotos) {
            const container = document.getElementById('status-container');
            const habilitados = currentUser.partidos_habilitados || {};
            const cantHabilitados = Object.values(habilitados).filter(v => v === true).length;
            const cantVotos = Object.keys(misVotos).filter(id => habilitados[id] === true).length;
            const cuposPagados = currentUser.cupos || 0;

            container.innerHTML = `
                <div style="font-size: 0.9rem; color: #aaa; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px;">
                    Costo por polla: <strong style="color: #4cd137;">$${(pollaConfig.precio || 0).toLocaleString()}</strong>
                    ${cuposPagados > 0 ? `<span style="margin-left:12px; color:#555; font-size:0.78rem;">(${cuposPagados} pagadas)</span>` : ''}
                </div>
                <div class="alert ${cantVotos < cantHabilitados ? 'alert-warning' : 'alert-info'}" 
                     style="border-radius:12px; border:none; background:rgba(255,255,255,0.05); padding:12px;">
                    <span style="font-size:1.05rem; display:block; margin-bottom:4px;">
                        <i class="fas fa-futbol" style="color:#4cd137;"></i>
                        Partidas habilitadas: <strong>${cantVotos} marcadas</strong> de <strong>${cantHabilitados} disponibles</strong>
                    </span>
                    ${cantVotos < cantHabilitados 
                        ? '<small style="color:#4cd137; font-weight:bold;">&#9989; Tienes partidas pendientes por marcar abajo.</small>'
                        : '<small style="color:#888;">Ya marcaste todas tus partidas habilitadas.</small>'}
                </div>
            `;
        }

        async function renderPartidos(misVotos) {
            const container = document.getElementById('partidos-container');
            const snap = await db.ref('polla/partidos').once('value');
            const habilitados = currentUser.partidos_habilitados || {};

            // Agrupar por fecha (día)
            const porFecha = {};
            snap.forEach(child => {
                const p = { id: child.key, ...child.val() };
                const dia = new Date(p.fecha).toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
                if(!porFecha[dia]) porFecha[dia] = [];
                porFecha[dia].push(p);
            });

            let html = '';
            const fechas = Object.keys(porFecha);

            if(fechas.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666;">No hay partidos programados.</p>';
                return;
            }

            fechas.forEach(dia => {
                const partidosDelDia = porFecha[dia];
                // Filtrar SOLO los habilitados para este usuario
                const habilitadosDelDia = partidosDelDia.filter(p => habilitados[p.id] === true);
                if(habilitadosDelDia.length === 0) return; // Si no hay ninguno habilitado, omitir el día completo

                html += `<div style="margin-bottom:20px;">
                    <div style="font-size:0.75rem; font-weight:800; color:#4cd137; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid rgba(76,209,55,0.2);">
                        📅 ${dia}
                    </div>`;

                // Solo iterar los habilitados
                habilitadosDelDia.forEach(p => {
                    const yaVotado = misVotos[p.id] !== undefined;
                    const vA = yaVotado ? misVotos[p.id].goles_a : '';
                    const vB = yaVotado ? misVotos[p.id].goles_b : '';

                    const borderColor = yaVotado ? '#4cd137' : 'rgba(255,255,255,0.12)';
                    const bgColor     = yaVotado ? 'rgba(76,209,55,0.06)' : 'transparent';
                    const etiqueta    = yaVotado
                        ? '<div style="font-size:0.72rem; color:#4cd137; text-align:center; margin-bottom:8px; font-weight:800;"><i class="fas fa-check-circle"></i> GUARDADO</div>'
                        : '';

                    html += `
                        <div class="partido-card" id="card-${p.id}" style="border:1px solid ${borderColor}; background:${bgColor}; transition: all 0.3s ease;">
                            <div class="partido-header">${new Date(p.fecha).toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'})}</div>
                            ${etiqueta}
                            <div class="score-grid">
                                <div class="team">${p.equipo_a}</div>
                                <input type="number" class="score-input goles-a" data-id="${p.id}" value="${vA}"
                                       ${yaVotado ? 'disabled' : ''} oninput="updateSaveButton()" min="0">
                                <span>-</span>
                                <input type="number" class="score-input goles-b" data-id="${p.id}" value="${vB}"
                                       ${yaVotado ? 'disabled' : ''} oninput="updateSaveButton()" min="0">
                                <div class="team">${p.equipo_b}</div>
                            </div>
                        </div>`;
                });

                html += '</div>';
            });

            container.innerHTML = html || '<p style="text-align:center; color:#666; padding:20px;">El administrador aún no ha habilitado partidos para ti.</p>';
            updateSaveButton();
        }

        function updateSaveButton() {
            const inputsA = document.querySelectorAll('.goles-a');
            const inputsB = document.querySelectorAll('.goles-b');
            const btnSave = document.getElementById('btn-save-vote');
            let nuevos = 0;
            inputsA.forEach((inp, i) => {
                if(!inp.disabled && inp.value !== '' && inputsB[i].value !== '') nuevos++;
            });
            btnSave.style.display = nuevos > 0 ? 'block' : 'none';
            btnSave.innerText = `⚽ GUARDAR ${nuevos} PRONÓSTICO(S)`;
        }

        async function savePronostico() {
            if(!confirm('¿Confirmas enviar tus pronósticos? Los que ya guardaste no cambiarán.')) return;
            const inputsA = document.querySelectorAll('.goles-a');
            const inputsB = document.querySelectorAll('.goles-b');
            const updates = {};
            inputsA.forEach((inp, i) => {
                if(!inp.disabled && inp.value !== '') {
                    updates[inp.dataset.id] = {
                        goles_a: parseInt(inp.value) || 0,
                        goles_b: parseInt(inputsB[i].value) || 0
                    };
                }
            });
            if(Object.keys(updates).length === 0) return;
            try {
                await db.ref(`polla/pronosticos/${currentUser.telefono}`).update(updates);
                alert('✅ ¡Pronósticos guardados exitosamente!');
            } catch(e) {
                alert('Error al guardar: ' + e.message);
            }
        }




        function logout() {
            localStorage.removeItem('polla_phone');
            location.reload();
        }
    </script>
</body>
</html>
